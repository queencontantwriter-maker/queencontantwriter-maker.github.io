<!DOCTYPE html>
<html>
<head>
  <title>Queen Content Writer - Contact</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f9f9f9; }
    .form-box { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0 0 10px #ddd; }
    input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
    button { background: #e91e63; color: white; border: none; padding: 12px 25px; border-radius: 5px; font-size: 16px; cursor: pointer; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="form-box">
    <h1>Contact Me</h1>
    <form action="https://formspree.io/f/meewpbvn" method="POST">
      
      <div id="step1">
        <p>Step 1: Your Email</p>
        <input type="email" name="email" placeholder="Enter your email" required>
        <br><br>
        <button type="button" onclick="nextStep()">Next</button>
      </div>

      <div id="step2" class="hidden">
        <p>Step 2: Your Message</p>
        <textarea name="message" placeholder="Type your message" required rows="4"></textarea>
        <br><br>
        <button type="button" onclick="prevStep()">Back</button>
        <button type="submit">Send Message</button>
      </div>

    </form>
  </div>

  <script>
    function nextStep() {
      document.getElementById('step1').classList.add('hidden');
      document.getElementById('step2').classList.remove('hidden');
    }
    function prevStep() {
      document.getElementById('step2').classList.add('hidden');
      document.getElementById('step1').classList.remove('hidden');
    }
  </script>
</body>
</html>
